-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Fetch User App</title>
  </head>
  <body>
    <!-- The Root Div where our React App mounts -->
    <div id="root"></div>
  </body>
</html>
