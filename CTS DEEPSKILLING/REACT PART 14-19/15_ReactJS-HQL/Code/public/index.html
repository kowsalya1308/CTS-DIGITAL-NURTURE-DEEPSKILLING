<!--
  This is the public HTML entry point for the React application.
  It contains the root div where the React app is mounted.
  No script tags or styles are added manually here; Create React App's
  bundler handles linking and optimization during build.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Ticket Raising Application for Registering Complaints"
    />
    <title>React App</title>
  </head>
  <body>
    <!-- The React app will inject all compiled scripts and styles inside this root element -->
    <div id="root"></div>
  </body>
</html>
